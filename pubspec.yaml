name: pos_app
description: "POS Machine Application - Flutter + Python Backend"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  window_manager: ^0.3.9
  cupertino_icons: ^1.0.8

  # ---------------- STATE MANAGEMENT ----------------
  flutter_riverpod: ^2.5.1

  # ---------------- API CALLS ----------------
  dio: ^5.4.0

  # ---------------- LOCAL DATABASE (OFFLINE) ----------------
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3   # Required for Windows
  path_provider: ^2.1.2
  path: ^1.9.0

  # ---------------- CONNECTIVITY ----------------
  connectivity_plus: ^6.0.3

  # ---------------- LOCAL STORAGE ----------------
  shared_preferences: ^2.2.2

  # ---------------- UTILITIES ----------------
  uuid: ^4.3.3

  # ---------------- PRINTER (THERMAL) ----------------
  esc_pos_utils_plus: ^2.0.4
  printing: ^5.11.1
  flutter_libserialport: ^0.3.0

  # ---------------- JSON MODEL SUPPORT ----------------
  json_annotation: ^4.9.0
  fl_chart: ^1.1.1
  intl: ^0.20.2
  flutter_pos_printer_platform_image_3: ^1.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true